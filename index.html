<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<title>Health App</title>
<link rel="manifest" href="/Health-app/manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f9fafb; height: 100vh; display: flex; flex-direction: column; }
iframe { flex: 1; border: none; width: 100%; height: 100%; }
#loading {
  position: fixed; inset: 0; background: #f9fafb;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: #4b5563; font-family: system-ui, sans-serif; z-index: 999;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #e5e7eb; border-top-color: #2563eb;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.logo { font-size: 2rem; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading">
  <div class="logo">🏥</div>
  <div class="spinner"></div>
  <span>Cargando Health App...</span>
</div>

<iframe
  id="app"
  src="https://script.google.com/macros/s/AKfycbyXxMywEbP7OeHT5rVg0Mjiyh5yrJxiIeQWcfsoTxG8Yinv9mVorw3LjXVbuYx5Y7gk/exec"
  onload="document.getElementById('loading').style.display='none'"
  allow="storage-access; camera"
></iframe>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/Health-app/sw.js');
}
history.pushState(null, null, location.href);
window.addEventListener('popstate', function() { history.pushState(null, null, location.href); });
</script>
</body>
</html>
